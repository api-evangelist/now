description: >-
  DNOW Inc. (NYSE: DNOW), formerly NOW Inc. and operating as DistributionNOW, is a
  Houston-headquartered Fortune 1000 distributor of pipe, valves, fittings (PVF),
  pumps and packaged, engineered process and production equipment serving the upstream,
  midstream, downstream energy, and industrial sectors. Spun off from National
  Oilwell Varco in 2014 and built on a heritage that spans more than 160 years, DNOW
  combines a global network of distribution branches and engineering facilities with
  the DigitalNOW platform — shop.dnow.com B2B eCommerce, cXML/OCI ERP punchout
  integrations, the eSpec product configurator, the AccessNOW automated inventory
  control system, and a library of customer-facing mobile applications. DNOW does
  not publish a public developer portal, OpenAPI specifications, or a self-serve
  API program; customer integrations are delivered through configured cXML/OCI
  punchout sessions tied to enterprise ERP systems. In June 2025 DNOW announced a
  definitive merger agreement to acquire MRC Global in an all-stock transaction
  valued at approximately $1.5 billion.
