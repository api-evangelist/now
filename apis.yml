  - type: Features
    data:
      - name: Energy and Industrial Distribution
        description: >-
          Distributor of pipe, valves, fittings (PVF), pumps and packaged,
          engineered process and production equipment to upstream, midstream,
          downstream energy, and industrial customers worldwide.
      - name: DigitalNOW Platform
        description: >-
          Umbrella platform spanning shop.dnow.com B2B eCommerce, cXML/OCI ERP
          punchout, the eSpec configurator, AccessNOW automated inventory control,
          and a library of customer mobile applications, marketed as using AI,
          machine learning, mobile, and IoT.
      - name: shop.dnow.com Catalog Scale
        description: >-
          Online eCatalog covering more than 160,000 SKUs with real-time,
          account-specific contract pricing, approvals, and invoicing; broader
          inventory referenced as 300,000 stocked SKUs across the company.
      - name: ERP Punchout Integration
        description: >-
          Customer ERP and third-party procurement systems integrate to
          shop.dnow.com via cXML or OCI punchout / roundtrip with automated PO
          creation, approval, invoice generation, and shipment notifications.
      - name: AccessNOW IoT Inventory
        description: >-
          24/7 secured tool-crib and stockroom access via badge, keypad, or
          facial recognition with barcode/RFID check-in and check-out and
          cloud-based transaction data.
      - name: Engineering, Design and Fabrication
        description: >-
          In-house engineering, design, and fabrication of pump packages,
          measurement skids, and other engineered process and production
          equipment for energy and industrial customers.
      - name: Pending MRC Global Merger
        description: >-
          DNOW and MRC Global announced a definitive all-stock merger agreement
          on June 26, 2025 valued at approximately $1.5 billion, which will
          materially expand DNOW's PVF distribution footprint.
  - type: UseCases
    data:
      - name: Upstream Oil and Gas Procurement
        description: >-
          Drilling, completions, artificial lift, and production operators source
          PVF, valves, pumps, and instrumentation through DNOW branches and the
          DigitalNOW eCommerce platform.
      - name: Midstream and Downstream Supply
        description: >-
          Pipelines, gas processing plants, refineries, and chemical plants source
          pipe, valves, fittings, electrical, and instrumentation supplies.
      - name: Industrial MRO and Facilities
        description: >-
          Industrial and manufacturing customers procure tools, safety / PPE,
          paint and coatings, electrical, and facilities supplies through DNOW
          branches and shop.dnow.com.
      - name: ERP-Driven Procurement
        description: >-
          Enterprise buyers using SAP, Oracle, Ariba, Coupa, or similar
          procurement systems punch out to shop.dnow.com via cXML / OCI and round
          carts back into their ERP for PO automation.
      - name: Engineered Equipment Packaging
        description: >-
          Operators specify and order pump packages, measurement and production
          skids, and other engineered equipment using the eSpec configurator and
          DNOW engineering services.
      - name: Vendor-Managed Tool Cribs
        description: >-
          Site operators deploy AccessNOW units to control 24/7 access to
          consumables, tools, and safety equipment with cloud-based transaction
          visibility.
  - type: Integrations
    data:
      - name: Customer ERP Systems (cXML / OCI)
        description: >-
          shop.dnow.com integrates to customer ERP and procurement platforms
          (e.g. SAP, Oracle, Ariba, Coupa, SciQuest-class systems) via cXML or
          OCI punchout / roundtrip configured per customer.
      - name: AccessNOW Devices
        description: >-
          Badge readers, keypads, facial-recognition units, barcode scanners,
          and RFID readers feed inventory transactions into DNOW's cloud-based
          inventory and replenishment systems.
      - name: DNOW Mobile Apps
        description: >-
          Customer-facing iOS and Android apps synchronize cart, order, and
          history data with the shop.dnow.com eCommerce account.
      - name: MRC Global (Pending Merger)
        description: >-
          Pending all-stock merger announced June 26, 2025; once closed,
          MRC Global's PVF distribution and digital surfaces are expected to be
          combined with DNOW's DigitalNOW platform.
  - type: Absences
    data:
      - name: No Public Developer Portal
        description: >-
          DNOW does not publish a developer.dnow.com style developer portal,
          public REST API reference, OpenAPI specifications, SDKs, CLI, webhooks,
          or sandbox environment.
      - name: No Public GitHub Organization
        description: >-
          There is no public github.com/dnow or github.com/distributionnow
          organization hosting DNOW SDKs, sample code, or API clients.
      - name: No Public Pricing Or Plans
        description: >-
          Commercial pricing is governed by customer-specific contracts negotiated
          through DNOW account teams; no public pricing tiers or rate-limited
          API plans are documented.
      - name: No Public Status Page
        description: >-
          No public status.dnow.com / status.shop.dnow.com uptime or incident
          page is published for shop.dnow.com or DigitalNOW services.
